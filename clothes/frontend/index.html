<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="debug-error" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; background: white; z-index: 99999; position: fixed; top: 0; left: 0;"></div>
    <script>
      window.addEventListener('error', function(event) {
        document.getElementById('debug-error').innerText += event.error ? event.error.stack : event.message;
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('debug-error').innerText += '\nPromise Rejection: ' + (event.reason ? event.reason.stack || event.reason : event);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
